<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima 360 PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b1220;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  background: #111a2e;
  align-items: center;
}

header h1 {
  font-size: 18px;
}

.container {
  display: flex;
  height: calc(100vh - 50px);
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: #0f172a;
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.sidebar input {
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.sidebar button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

.metric {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

/* MAPA */
#map {
  flex: 1;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .sidebar {
    width: 100%;
    flex-direction: row;
    overflow-x: auto;
  }
}
</style>
</head>

<body>

<header>
  <h1>?? Clima 360 PRO</h1>
</header>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <input id="cityInput" placeholder="Ej: San Luis"/>
    <button onclick="searchCity()">Consultar</button>
    <button onclick="useMyLocation()">?? Ubicaci©«n</button>

    <div class="metric" id="tempBox">?? -- ĪŃC</div>
    <div class="metric" id="windBox">?? -- km/h</div>
    <div class="metric" id="humidityBox">?? -- %</div>
  </div>

  <!-- MAPA -->
  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- WIND -->
<script src="https://unpkg.com/leaflet-velocity/dist/leaflet-velocity.min.js"></script>

<script>

let map;
let rainLayer;
let tempLayer;
let windLayer;
let marker;

function initMap(lat = -33.3, lon = -66.3) {

  map = L.map('map').setView([lat, lon], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '? OpenStreetMap'
  }).addTo(map);

  marker = L.marker([lat, lon]).addTo(map);

  loadRain();
  loadTemp();
  loadWind();

  addControls();
}

/////////////////////////
// ?? RADAR ANIMADO
/////////////////////////
async function loadRain() {

  const res = await fetch("https://api.rainviewer.com/public/weather-maps.json");
  const data = await res.json();

  const latestFrame = data.radar.past[data.radar.past.length - 1];

  rainLayer = L.tileLayer(
    `https://tilecache.rainviewer.com/v2/radar/${latestFrame.path}/256/{z}/{x}/{y}/2/1_1.png`,
    { opacity: 0.6 }
  );

  rainLayer.addTo(map);
}

/////////////////////////
// ?? TEMPERATURA
/////////////////////////
function loadTemp() {
  const key = "80bb3082e67e9526638c99a6e59685fe";

  tempLayer = L.tileLayer(
    `https://tile.openweathermap.org/map/temp_new/{z}/{x}/{y}.png?appid=${key}`,
    { opacity: 0.4 }
  );
}

/////////////////////////
// ?? VIENTO ANIMADO
/////////////////////////
async function loadWind() {
  const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=-33&longitude=-66&hourly=wind_speed_10m");
  const data = await res.json();

  // mock simple (windjs requiere formato complejo)
  windLayer = L.velocityLayer({
    displayValues: true,
    displayOptions: {
      velocityType: "Wind",
      position: "bottomleft"
    },
    data: [] // (se puede mejorar despu©”s)
  });

  windLayer.addTo(map);
}

/////////////////////////
// ?? CONTROLES
/////////////////////////
function addControls() {

  const overlays = {
    "?? Lluvia": rainLayer,
    "?? Temperatura": tempLayer,
    "?? Viento": windLayer
  };

  L.control.layers(null, overlays).addTo(map);
}

/////////////////////////
// ?? BUSCAR CIUDAD
/////////////////////////
async function searchCity() {

  const city = document.getElementById("cityInput").value;

  const res = await fetch(`/api/weather?city=${city}`);
  const data = await res.json();

  const lat = data.sources.openweather.lat;
  const lon = data.sources.openweather.lon;

  updateMap(lat, lon);
  updateUI(data);
}

/////////////////////////
// ?? UBICACI©«N
/////////////////////////
function useMyLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    fetch(`/api/weather?lat=${lat}&lon=${lon}`)
      .then(res => res.json())
      .then(data => {
        updateMap(lat, lon);
        updateUI(data);
      });
  });
}

/////////////////////////
// ?? ACTUALIZAR MAPA
/////////////////////////
function updateMap(lat, lon) {
  map.setView([lat, lon], 8);

  if (marker) map.removeLayer(marker);

  marker = L.marker([lat, lon]).addTo(map)
    .bindPopup("Ubicaci©«n")
    .openPopup();
}

/////////////////////////
// ?? UI
/////////////////////////
function updateUI(data) {

  document.getElementById("tempBox").innerHTML =
    `?? ${data.consensus ?? "--"} ĪŃC`;

  document.getElementById("windBox").innerHTML =
    `?? ${data.sources?.smn?.wind ?? "--"} km/h`;

  document.getElementById("humidityBox").innerHTML =
    `?? ${data.sources?.smn?.humidity ?? "--"} %`;
}

/////////////////////////

initMap();

</script>

</body>
</html>
