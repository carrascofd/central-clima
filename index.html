<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Clima 360</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b1220;
  color: white;
}

header {
  padding: 15px;
  font-size: 20px;
  font-weight: bold;
  background: #111a2e;
}

.container {
  padding: 15px;
}

/* BUSCADOR */
.search {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.search input {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

.search button {
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  background: #2563eb;
  color: white;
  cursor: pointer;
}

/* GRID PRINCIPAL */
.main {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 15px;
}

/* CARD PRINCIPAL */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
}

.temp {
  font-size: 48px;
  font-weight: bold;
}

.conf {
  color: orange;
}

/* METRICAS */
.metrics {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.metric {
  flex: 1;
  background: #111a2e;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

/* MAPA */
#map {
  height: 250px;
  border-radius: 16px;
}

/* TABS */
.tabs {
  margin-top: 20px;
}

.tab-buttons {
  display: flex;
  gap: 10px;
}

.tab-buttons button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  background: #1e293b;
  color: white;
  cursor: pointer;
}

.tab-buttons button.active {
  background: #2563eb;
}

.tab-content {
  margin-top: 10px;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}

.hidden {
  display: none;
}

/* MOBILE */
@media (max-width: 768px) {
  .main {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<header>?? Clima 360</header>

<div class="container">

  <!-- BUSCADOR -->
  <div class="search">
    <input id="cityInput" placeholder="Ej: San Luis"/>
    <button onclick="searchCity()">Consultar</button>
    <button onclick="useMyLocation()">??</button>
  </div>

  <!-- GRID -->
  <div class="main">

    <!-- INFO -->
    <div class="card">
      <div id="location">-</div>

      <div class="temp" id="temp">-- ˇăC</div>
      <div id="desc">-</div>

      <div class="conf" id="confidence"></div>

      <div class="metrics">
        <div class="metric" id="wind">?? --</div>
        <div class="metric" id="humidity">?? --</div>
        <div class="metric" id="pressure">?? --</div>
      </div>
    </div>

    <!-- MAPA -->
    <div id="map"></div>

  </div>

  <!-- TABS APIs -->
  <div class="tabs">

    <div class="tab-buttons">
      <button onclick="showTab('ow')" class="active">OpenWeather</button>
      <button onclick="showTab('wb')">Weatherbit</button>
      <button onclick="showTab('om')">OpenMeteo</button>
      <button onclick="showTab('smn')">SMN</button>
    </div>

    <div id="ow" class="tab-content">
      <div id="owData"></div>
    </div>

    <div id="wb" class="tab-content hidden">
      <div id="wbData"></div>
    </div>

    <div id="om" class="tab-content hidden">
      <div id="omData"></div>
    </div>

    <div id="smn" class="tab-content hidden">
      <div id="smnData"></div>
    </div>

  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let marker;

function initMap(lat = -33.3, lon = -66.3) {
  map = L.map('map').setView([lat, lon], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  marker = L.marker([lat, lon]).addTo(map);
}

async function searchCity() {
  const city = document.getElementById("cityInput").value;

  const res = await fetch(`/api/weather?city=${city}`);
  const data = await res.json();

  updateUI(data);
}

function useMyLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    fetch(`/api/weather?lat=${lat}&lon=${lon}`)
      .then(r => r.json())
      .then(updateUI);
  });
}

function updateUI(data) {

  document.getElementById("location").innerText = data.city;

  document.getElementById("temp").innerHTML =
    `${data.consensus ?? "--"} &deg;C`;

  document.getElementById("desc").innerText =
    data.sources.openweather.desc || "";

  document.getElementById("confidence").innerText =
    `Confianza: ${data.confidence}`;

  document.getElementById("wind").innerText =
    `?? ${data.sources.smn?.wind ?? "-"} km/h`;

  document.getElementById("humidity").innerText =
    `?? ${data.sources.smn?.humidity ?? "-"}%`;

  document.getElementById("pressure").innerText =
    `?? ${data.sources.openweather?.pressure ?? "-"} hPa`;

  // MAPA
  const lat = data.sources.openweather.lat;
  const lon = data.sources.openweather.lon;

  map.setView([lat, lon], 8);

  if (marker) map.removeLayer(marker);

  marker = L.marker([lat, lon]).addTo(map);

  // TABS
  document.getElementById("owData").innerHTML =
    `${data.sources.openweather.temp} ˇăC - ${data.sources.openweather.desc}`;

  document.getElementById("wbData").innerHTML =
    `${data.sources.weatherbit.temp ?? "-"} ˇăC`;

  document.getElementById("omData").innerHTML =
    `${data.sources.openmeteo?.temp ?? "-"} ˇăC`;

  document.getElementById("smnData").innerHTML =
    `${data.sources.smn.temp ?? "-"} ˇăC <br>${data.sources.smn.desc}`;
}

function showTab(tab) {

  document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));

  document.getElementById(tab).classList.remove("hidden");

  document.querySelectorAll(".tab-buttons button")
    .forEach(b => b.classList.remove("active"));

  event.target.classList.add("active");
}

initMap();

</script>

</body>
</html>
