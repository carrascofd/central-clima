<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Central de Clima</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }

    .main-card {
      background: #1e293b;
      padding: 25px;
      border-radius: 15px;
      margin-top: 20px;
    }

    .consensus {
      font-size: 48px;
      font-weight: bold;
    }

    .confidence {
      margin-top: 10px;
      font-size: 18px;
    }

    .alta { color: #22c55e; }
    .media { color: #f59e0b; }
    .baja { color: #ef4444; }

    .sources {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      width: 220px;
      text-align: left;
    }

    .ok { border-left: 5px solid #22c55e; }
    .error { border-left: 5px solid #ef4444; }
    .limit { border-left: 5px solid #f59e0b; }
    .outlier { border-left: 5px solid #a855f7; }

    .temp {
      font-size: 22px;
      font-weight: bold;
    }

    .outlier-text {
      text-decoration: line-through;
      color: #888;
    }

    .status {
      font-size: 12px;
      margin-top: 5px;
    }
  </style>
</head>
<body>

  <h1>?? Central de Clima</h1>

  <input type="text" id="city" placeholder="Ej: San Luis" />
  <button onclick="getWeather()">Consultar</button>
  <button onclick="getLocationWeather()">?? Ubicaci¨®n</button>

  <!-- CONSENSO -->
  <div class="main-card">
    <div id="consensus" class="consensus">-- ˇăC</div>
    <div id="confidence" class="confidence"></div>
  </div>

  <!-- FUENTES -->
  <div id="sources" class="sources"></div>

<script>
async function getWeather(lat = null, lon = null) {
  const city = document.getElementById("city").value || "San Luis";

  let url = `/api/weather?city=${encodeURIComponent(city)}`;

  if (lat && lon) {
    url += `&lat=${lat}&lon=${lon}`;
  }

  const res = await fetch(url);
  const data = await res.json();

  render(data);
}

function getLocationWeather() {
  navigator.geolocation.getCurrentPosition(pos => {
    getWeather(pos.coords.latitude, pos.coords.longitude);
  });
}

function render(data) {
  // CONSENSO
  const consensusEl = document.getElementById("consensus");
  const confidenceEl = document.getElementById("confidence");
  const sourcesEl = document.getElementById("sources");

  consensusEl.innerHTML = data.consensus
    ? `${data.consensus} ˇăC`
    : "-- ˇăC";

  confidenceEl.innerHTML = `
    Confianza:
    <span class="${data.confidence}">
      ${data.confidence.toUpperCase()} (${data.confidenceScore}%)
    </span>
  `;

  // FUENTES
  sourcesEl.innerHTML = "";

  Object.entries(data.sources).forEach(([name, s]) => {

    const card = document.createElement("div");
    card.className = `card ${s.status}`;

    let tempClass = "";
    if (s.status === "outlier") tempClass = "outlier-text";

    card.innerHTML = `
      <h3>${name.toUpperCase()}</h3>

      <div class="temp ${tempClass}">
        ${s.temp != null ? s.temp + "ˇăC" : "--"}
      </div>

      <div class="status">
        Estado: ${s.status}
      </div>
    `;

    sourcesEl.appendChild(card);
  });
}
</script>

</body>
</html>
