<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Central de Clima</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.header {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:20px;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#3b82f6;
  color:white;
}

.container {
  max-width:1100px;
  margin:auto;
}

.main-card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:20px;
}

#map {
  height:250px;
  border-radius:12px;
}

.api-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap:15px;
  margin-top:20px;
}

.api-card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

.ok { color:#22c55e; }
.error { color:#ef4444; }

h1 { margin:0; }
</style>
</head>

<body>

<div class="header">
  <input id="city" placeholder="Ciudad"/>
  <button onclick="buscar()">Consultar</button>
</div>

<div class="container">

  <div class="main-card">
    <h1 id="temp">-- ˇăC</h1>
    <p id="confidence"></p>
  </div>

  <div class="grid">
    <div class="main-card">
      <p id="avg"></p>
      <p id="sources"></p>
    </div>

    <div id="map"></div>
  </div>

  <div class="api-grid" id="apis"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
let map;
let marker;

function initMap(lat, lon) {
  if (!map) {
    map = L.map('map').setView([lat, lon], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '? OpenStreetMap'
    }).addTo(map);

    marker = L.marker([lat, lon]).addTo(map);
  } else {
    map.setView([lat, lon], 10);
    marker.setLatLng([lat, lon]);
  }
}

window.onload = () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      cargar(lat, lon);
    });
  }
};

function buscar() {
  const city = document.getElementById("city").value;
  if (!city) return;

  fetch(`/api/weather?city=${city}`)
    .then(r => r.json())
    .then(render);
}

function cargar(lat, lon) {
  fetch(`/api/weather?lat=${lat}&lon=${lon}`)
    .then(r => r.json())
    .then(data => {
      render(data);
      initMap(lat, lon);
    });
}

function render(data) {

  document.getElementById("temp").innerText =
    data.consensus != null ? `${data.consensus} ˇăC` : "-- ˇăC";

  document.getElementById("confidence").innerText =
    `Confianza: ${data.confidence}`;

  document.getElementById("avg").innerText =
    `Promedio: ${data.average ?? "-" } ˇăC`;

  const active = Object.values(data.sources)
    .filter(s => s.temp != null).length;

  document.getElementById("sources").innerText =
    `Fuentes OK: ${active}`;

  const container = document.getElementById("apis");
  container.innerHTML = "";

  const names = {
    openweather: "OpenWeather",
    weatherbit: "Weatherbit",
    openmeteo: "Open-Meteo",
    smn: "SMN (Argentina)"
  };

  for (const key in data.sources) {
    const s = data.sources[key];

    const div = document.createElement("div");
    div.className = "api-card";

    div.innerHTML = `
      <h3>${names[key] || key}</h3>
      <p>Temp: ${s.temp != null ? s.temp + " ˇăC" : "-"}</p>
      <p>${s.desc || ""}</p>
      <p class="${s.temp != null ? "ok" : "error"}">
        Estado: ${s.temp != null ? "ok" : "sin datos"}
      </p>
    `;

    container.appendChild(div);
  }
}
</script>

</body>
</html>
