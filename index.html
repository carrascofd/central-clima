<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Central de Clima</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: none;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      margin-left: 5px;
    }

    .container {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      width: 220px;
      text-align: left;
    }

    .ok { border-left: 5px solid #22c55e; }
    .error { border-left: 5px solid #ef4444; }
    .limit { border-left: 5px solid #f59e0b; }

    .temp {
      font-size: 24px;
      font-weight: bold;
    }

    .avg {
      margin-top: 20px;
      font-size: 28px;
    }
  </style>
</head>
<body>

  <h1>?? Central de Clima</h1>

  <input type="text" id="city" placeholder="Ej: San Luis" />
  <button onclick="getWeather()">Consultar</button>
  <button onclick="getLocationWeather()">?? Mi ubicaci¨®n</button>

  <div class="container" id="results"></div>

  <div class="avg" id="average"></div>

<script>
async function getWeather(lat = null, lon = null) {
  const city = document.getElementById("city").value || "San Luis";

  let url = `/api/weather?city=${encodeURIComponent(city)}`;

  if (lat && lon) {
    url += `&lat=${lat}&lon=${lon}`;
  }

  const res = await fetch(url);
  const data = await res.json();

  render(data);
}

function getLocationWeather() {
  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    getWeather(lat, lon);
  });
}

function render(data) {
  const container = document.getElementById("results");
  const avgDiv = document.getElementById("average");

  container.innerHTML = "";

  const sources = data.sources;

  Object.keys(sources).forEach(key => {
    const s = sources[key];

    const card = document.createElement("div");
    card.className = `card ${s.status}`;

    card.innerHTML = `
      <h3>${key.toUpperCase()}</h3>
      <div class="temp">${s.temp !== null ? s.temp + "ˇăC" : "--"}</div>
      <div>${s.desc || ""}</div>
      <div style="margin-top:5px; font-size:12px;">
        Estado: ${s.status}
      </div>
      <div style="color:#f87171; font-size:11px;">
        ${s.error || ""}
      </div>
    `;

    container.appendChild(card);
  });

  avgDiv.innerHTML = data.average
    ? `?? Promedio: ${data.average} ˇăC`
    : "Sin datos suficientes";
}
</script>

</body>
</html>
