<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clima 360 PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
.header { padding:15px; text-align:center; }
input, button { padding:10px; border-radius:8px; border:none; }
.container { max-width:1000px; margin:auto; padding:15px; }
.card { background:#1e293b; padding:15px; border-radius:12px; margin-bottom:15px; }
.grid { display:grid; grid-template-columns:1fr 300px; gap:10px; }
#map { height:250px; border-radius:12px; }
.tabs { display:flex; margin-top:10px; }
.tab { flex:1; padding:10px; background:#1e293b; cursor:pointer; text-align:center; }
.tab.active { background:#3b82f6; }
.ok { color:#22c55e; }
.fail { color:#ef4444; }
</style>
</head>

<body>

<div class="header">
  <input id="city" placeholder="Ciudad">
  <button onclick="getWeather()">Consultar</button>
  <button onclick="getLocation()">??</button>
</div>

<div class="container">

<div class="card">
  <h1 id="temp">-- ¡ãC</h1>
  <div id="desc"></div>
  <div id="confidence"></div>
</div>

<div class="grid">
  <div class="card" id="details"></div>
  <div id="map"></div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('openweather')">OW</div>
  <div class="tab" onclick="showTab('weatherbit')">WB</div>
  <div class="tab" onclick="showTab('openmeteo')">OM</div>
  <div class="tab" onclick="showTab('smn')">SMN</div>
</div>

<div class="card" id="tabContent"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const DEG = "\u00B0";
let map, marker, dataGlobal;

function initMap(lat, lon){
  if(!map){
    map = L.map('map').setView([lat, lon], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([lat, lon]).addTo(map);
  } else {
    map.setView([lat, lon], 10);
    marker.setLatLng([lat, lon]);
  }
}

async function getWeather(lat=null, lon=null){
  let url = "/api/weather";

  if(lat && lon) url += `?lat=${lat}&lon=${lon}`;
  else url += `?city=${document.getElementById("city").value}`;

  const res = await fetch(url);
  const data = await res.json();

  dataGlobal = data;

  document.getElementById("temp").innerText =
    (data.consensus ?? "--") + " " + DEG + "C";

  document.getElementById("desc").innerText = data.note || "";
  document.getElementById("confidence").innerText =
    "Confianza: " + data.confidence;

  document.getElementById("details").innerHTML =
    `Promedio: ${data.average ?? "-"} ${DEG}C <br>
     Fuentes OK: ${Object.values(data.status).filter(s=>s==="ok").length}`;

  if(data.coord?.lat) initMap(data.coord.lat, data.coord.lon);

  showTab("openweather");
}

function showTab(name){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.querySelectorAll(".tab").forEach(t=>{
    if(t.innerText.toLowerCase().includes(name.substring(0,2))) {
      t.classList.add("active");
    }
  });

  const s = dataGlobal.sources[name];
  const status = dataGlobal.status[name];

  document.getElementById("tabContent").innerHTML = `
    <h3>${name}</h3>
    <p>Temp: ${s?.temp ?? "-"} ${DEG}C</p>
    <p>${s?.desc ?? ""}</p>
    <p class="${status==="ok"?"ok":"fail"}">Estado: ${status}</p>
  `;
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    getWeather(pos.coords.latitude, pos.coords.longitude);
  });
}
</script>

</body>
</html>
