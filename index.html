<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Clima</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#020617;
  color:white;
}

/* HEADER */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  background:#0f172a;
}

.menu-btn {
  font-size:22px;
  cursor:pointer;
}

.search input {
  padding:8px;
  border-radius:8px;
  border:none;
}

.search button {
  padding:8px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100%;
  background:#0f172a;
  padding:20px;
  transition:0.3s;
  z-index:10;
}

.sidebar.active {
  left:0;
}

.sidebar h3 {
  margin-top:0;
}

.sidebar div {
  margin:10px 0;
  cursor:pointer;
}

/* MAIN */
.main {
  padding:20px;
  text-align:center;
}

/* CONSENSO */
.big-temp {
  font-size:64px;
  font-weight:bold;
}

.confidence {
  margin-top:10px;
}

.alta {color:#22c55e;}
.media {color:#f59e0b;}
.baja {color:#ef4444;}

/* METRICS */
.metrics {
  display:grid;
  grid-template-columns: repeat(2,1fr);
  gap:10px;
  margin-top:20px;
}

.metric {
  background:#0f172a;
  padding:15px;
  border-radius:12px;
}

/* SOURCES */
.sources {
  margin-top:20px;
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.card {
  min-width:150px;
  background:#0f172a;
  padding:10px;
  border-radius:10px;
}

.ok {border-left:4px solid #22c55e;}
.outlier {border-left:4px solid purple;}
.error {border-left:4px solid red;}

.outlier-text {
  text-decoration:line-through;
  opacity:0.5;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>?? Panel</h3>
  <div onclick="alert('Pr©«ximo: hist©«rico')">?? Hist©«rico</div>
  <div onclick="alert('Pr©«ximo: mapa')">??? Mapa</div>
  <div onclick="alert('Pr©«ximo: alertas')">?? Alertas</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">?</div>

  <div class="search">
    <input id="city" placeholder="Ciudad">
    <button onclick="getWeather()">OK</button>
  </div>

  <div onclick="getLocation()">??</div>
</div>

<!-- MAIN -->
<div class="main">

  <div id="temp" class="big-temp">--ĪŃC</div>

  <div id="confidence" class="confidence"></div>

  <!-- M©”TRICAS -->
  <div class="metrics">
    <div class="metric">?? Humedad: <span id="humidity">--</span></div>
    <div class="metric">?? Viento: <span id="wind">--</span></div>
    <div class="metric">?? Fuente SMN: <span id="smnStation">--</span></div>
    <div class="metric">?? APIs activas: <span id="apiCount">--</span></div>
  </div>

  <!-- SOURCES -->
  <div id="sources" class="sources"></div>

</div>

<script>

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    getWeather(pos.coords.latitude,pos.coords.longitude);
  });
}

async function getWeather(lat=null,lon=null){
  const city = document.getElementById("city").value || "San Luis";

  let url = `/api/weather?city=${city}`;
  if(lat && lon) url += `&lat=${lat}&lon=${lon}`;

  const res = await fetch(url);
  const data = await res.json();

  render(data);
}

function render(data){

  // CONSENSO
  document.getElementById("temp").innerHTML =
    data.consensus ? `${data.consensus}ĪŃC` : "--";

  document.getElementById("confidence").innerHTML =
    `Confianza: <span class="${data.confidence}">
      ${data.confidence} (${data.confidenceScore}%)
    </span>`;

  // METRICS (fallback simple)
  document.getElementById("humidity").innerText =
    data.sources.smn?.desc?.match(/(\d+)%/)?.[1] || "--";

  document.getElementById("wind").innerText =
    data.sources.smn?.desc?.match(/(\d+) km/)?.[1] || "--";

  document.getElementById("smnStation").innerText =
    data.sources.smn?.desc?.split("|")[0] || "--";

  // API COUNT
  const active = Object.values(data.sources)
    .filter(s=>s.status==="ok").length;

  document.getElementById("apiCount").innerText = active;

  // SOURCES
  const container = document.getElementById("sources");
  container.innerHTML = "";

  Object.entries(data.sources).forEach(([name,s])=>{

    const card = document.createElement("div");
    card.className = `card ${s.status}`;

    const outlier = s.status==="outlier";

    card.innerHTML = `
      <strong>${name}</strong>
      <div class="${outlier?'outlier-text':''}">
        ${s.temp ?? "--"}ĪŃC
      </div>
      <small>${s.status}</small>
    `;

    container.appendChild(card);
  });
}

</script>

</body>
</html>
