<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Clima 360 PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
.header {
  padding:15px;
  display:flex;
  gap:10px;
  justify-content:center;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:200px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

/* MAIN */
.container {
  max-width:1100px;
  margin:auto;
  padding:15px;
}

/* CARD PRINCIPAL */
.main-card {
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

.temp {
  font-size:48px;
  font-weight:bold;
}

.desc {
  opacity:.8;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: 1fr 350px;
  gap:15px;
}

.info-box {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
}

/* MAPA */
#map {
  height:250px;
  border-radius:12px;
}

/* TABS */
.tabs {
  display:flex;
  margin-top:20px;
}

.tab {
  flex:1;
  padding:10px;
  text-align:center;
  background:#1e293b;
  cursor:pointer;
  border-right:1px solid #334155;
}

.tab.active {
  background:#3b82f6;
}

.tab-content {
  background:#1e293b;
  padding:15px;
  border-radius:0 0 12px 12px;
}

/* STATUS */
.ok { color:#22c55e; }
.fail { color:#ef4444; }

</style>
</head>

<body>

<div class="header">
  <input id="city" placeholder="Ej: San Luis"/>
  <button onclick="getWeather()">Consultar</button>
  <button onclick="getLocation()">??</button>
</div>

<div class="container">

  <!-- MAIN -->
  <div class="main-card">
    <div id="temp" class="temp">-- ˇăC</div>
    <div id="desc" class="desc">---</div>
    <div id="confidence"></div>
  </div>

  <!-- GRID -->
  <div class="grid">
    <div class="info-box">
      <h3>Detalles</h3>
      <div id="details"></div>
    </div>

    <div id="map"></div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('ow')">OpenWeather</div>
    <div class="tab" onclick="showTab('wb')">Weatherbit</div>
    <div class="tab" onclick="showTab('om')">OpenMeteo</div>
    <div class="tab" onclick="showTab('smn')">SMN</div>
  </div>

  <div id="tab-content" class="tab-content"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

let map;
let marker;
let dataGlobal = null;

function initMap(lat, lon) {
  if (!map) {
    map = L.map('map').setView([lat, lon], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution:'? OpenStreetMap'
    }).addTo(map);

    marker = L.marker([lat, lon]).addTo(map);
  } else {
    map.setView([lat, lon], 10);
    marker.setLatLng([lat, lon]);
  }
}

async function getWeather(lat=null, lon=null) {
  const city = document.getElementById("city").value;

  let url = "/api/weather";

  if (lat && lon) {
    url += `?lat=${lat}&lon=${lon}`;
  } else {
    url += `?city=${city}`;
  }

  const res = await fetch(url);
  const data = await res.json();

  dataGlobal = data;

  document.getElementById("temp").innerText =
    (data.consensus ?? "--") + " ˇăC";

  document.getElementById("desc").innerText =
    data.note || "Sin observaciones";

  document.getElementById("confidence").innerHTML =
    "Confianza: " + (data.confidence || "-");

  document.getElementById("details").innerHTML = `
    Promedio APIs: ${data.average ?? "-"} ˇăC <br>
    Fuentes activas: ${Object.values(data.status || {}).filter(s => s==="ok").length}
  `;

  if (data.coord) {
    initMap(data.coord.lat, data.coord.lon);
  }

  showTab("ow");
}

function showTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

  document.querySelectorAll(".tab").forEach(t => {
    if (t.innerText.toLowerCase().includes(tab)) {
      t.classList.add("active");
    }
  });

  if (!dataGlobal) return;

  const src = dataGlobal.sources;

  let html = "";

  if (tab === "ow") {
    html = renderSource("OpenWeather", src.openweather, dataGlobal.status.openweather);
  }
  if (tab === "wb") {
    html = renderSource("Weatherbit", src.weatherbit, dataGlobal.status.weatherbit);
  }
  if (tab === "om") {
    html = renderSource("OpenMeteo", src.openmeteo, dataGlobal.status.openmeteo);
  }
  if (tab === "smn") {
    html = renderSource("SMN", src.smn, dataGlobal.status.smn);
  }

  document.getElementById("tab-content").innerHTML = html;
}

function renderSource(name, src, status) {
  return `
    <h3>${name}</h3>
    <p>Temperatura: ${src?.temp ?? "-"} ˇăC</p>
    <p>${src?.desc ?? ""}</p>
    <p class="${status === "ok" ? "ok" : "fail"}">
      Estado: ${status}
    </p>
  `;
}

function getLocation() {
  navigator.geolocation.getCurrentPosition(pos => {
    getWeather(pos.coords.latitude, pos.coords.longitude);
  });
}

</script>

</body>
</html>
